# ===============================================================
# CORE APPLICATION SETTINGS
# ===============================================================
spring.application.name=cryptowallet
server.port=8080
spring.docker.compose.lifecycle-management=start_and_stop

# ===============================================================
# DATABASE & JPA (HIBERNATE)
# ===============================================================
# 'update' is common for dev; use 'validate' or 'none' for production
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never

# Performance: JDBC Batching
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Timezone & Serialization
# Force the JVM to UTC so OffsetDateTime.now() is always UTC
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss.SSSXXX
spring.jackson.time-zone=UTC

# ===============================================================
# SECURITY & JWT
# ===============================================================
authentication.jwt.tokenExpiryTimeMinutes=30
authentication.jwt.refreshTokenExpiryTimeMinutes=1440

# ===============================================================
# THIRD-PARTY INTEGRATIONS (COINCAP)
# ===============================================================
coincap.baseUrl=https://rest.coincap.io/v3
coincap.apiKey=REPLACE_ME
coincap.assetsPath=/assets
coincap.pricePath=/price/bysymbol/{symbol}

# ===============================================================
# SCHEDULING (CRON)
# ===============================================================
# Defaulting to midnight - adjust as needed
# jobs.scheduling.fetchAssetsCron=0 0 0 * * *
jobs.scheduling.fetchPriceCron=0/30 * * * * *

# ===============================================================
# MONITORING & OBSERVABILITY (ACTUATOR / PROMETHEUS)
# ===============================================================
# Expose the prometheus endpoint
management.endpoints.web.exposure.include=health,metrics,prometheus
# Add tags to identify your app in the dashboard
management.metrics.tags.application=${spring.application.name}

# ===============================================================
# LOGGING
# ===============================================================
logging.file.name=logs/crypto-wallet.log
# logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n